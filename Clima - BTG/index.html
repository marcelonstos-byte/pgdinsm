<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Previsão do Tempo Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
         :root {
            --text: #fff;
            --glass: rgba(255, 255, 255, .14);
            --muted: rgba(255, 255, 255, .75);
            --card-accent: rgba(255, 255, 255, 0.06);
            font-family: 'Inter', sans-serif;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            color: var(--text);
        }
        
        .bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: background-image .8s ease;
            z-index: 0;
        }
        
        .bg .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.40);
            z-index: 1;
        }
        
        .wrap {
            position: relative;
            z-index: 2;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            width: 80vw;
            max-width: 1200px;
            background: var(--glass);
            backdrop-filter: blur(14px);
            border-radius: 22px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 28px;
            font-weight: 600;
        }
        
        #city {
            font-size: 32px;
        }
        
        .updated {
            margin-top: 6px;
            font-size: 14px;
            color: var(--muted);
            width: 100%;
        }
        
        .icon {
            height: 140px;
            margin-top: 18px;
        }
        
        .temp {
            font-size: 95px;
            margin-top: 10px;
            font-weight: 800;
        }
        
        .cond {
            font-size: 20px;
            text-transform: capitalize;
            color: var(--muted);
        }
        
        .stats {
            margin-top: 15px;
            font-size: 18px;
            color: var(--muted);
        }
        
        .forecast-wrapper {
            width: 100%;
            margin-top: 45px;
            position: relative;
            display: flex;
            justify-content: center;
        }
        
        .forecast-bg {
            position: absolute;
            inset: auto 0 0 0;
            height: 130px;
            background: rgba(139, 138, 138, 0.85);
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
            z-index: 0;
        }
        
        .days {
            width: 100%;
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 1;
            padding: 16px 24px;
        }
        
        .day {
            text-align: center;
            width: 22%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .day img {
            height: 40px;
        }
        
        @media (max-width: 700px) {
            .temp {
                font-size: 56px;
            }
            .icon {
                height: 90px;
            }
            .forecast-bg {
                height: 160px;
            }
        }
    </style>
</head>

<body>
    <div class="bg" id="bg">
        <div class="overlay"></div>
    </div>

    <div class="wrap">
        <div class="card">
            <div class="top">
                <div class="city-block">
                    <div class="label">Clima Atual</div>
                    <div id="city">Sincronizando...</div>
                    <div id="updated" class="updated">Aguardando vínculo...</div>
                </div>
                <div id="clock">--:--</div>
            </div>

            <img id="icon" class="icon" src="" alt="Ícone Clima">
            <div class="temp" id="temp">--°C</div>
            <div class="cond" id="cond">--</div>

            <div class="stats">
                Sensação: <span id="feel">--°C</span> • Vento: <span id="wind">-- km/h</span> • Umidade: <span id="hum">--%</span>
            </div>

            <div class="forecast-wrapper">
                <div class="forecast-bg"></div>
                <div id="forecast" class="days"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDiTbWSlcKpsPEtEzPkSU0jHZkfcAg5fNU",
            authDomain: "newsmartonapp.firebaseapp.com",
            projectId: "newsmartonapp",
            databaseURL: "https://newsmartonapp-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. CATÁLOGO DE ATIVOS (Caminhos Revisados)
// 2. CATÁLOGO DE ATIVOS (Caminhos Corrigidos para 'icons/')
        const CATALOG = {
            // Backgrounds - Note o 'i' minúsculo para coincidir com sua pasta
            DiaAberto: "icons/DiaAberto.jpg",
            NoiteAberta: "icons/NoiteAberta.jpg",
            Chuvoso: "icons/Chuvoso.jpg",
            Nublado: "icons/Nublado.jpg",
            tempestade: "icons/tempestade.jpeg", // Corrigido de .jpg para .jpeg conforme imagem 8c54b7

            // Ícones - Note o 'i' minúsculo
            IconEnsolarado: "icons/IconEnsolarado.png",
            IconNoite: "icons/IconNoite.png",
            IconNublado: "icons/IconNublado.png",
            IconChuva: "icons/IconChuva.png",
            IconTempestade: "icons/IconTempestade.png"
        };

        // 3. VARIÁVEIS DE ESTADO
        let deviceId = localStorage.getItem("painelDeviceId") || "dev-" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("painelDeviceId", deviceId);

        let currentUid = localStorage.getItem("painelUid");
        let cidadeTerminal = "Bertioga, SP";
        let indexRegional = 0; // Esta variável resolve o erro 'cidadeIndex is not defined' se usada corretamente

        const regioesBrasil = {
            // --- SUDESTE ---
            "Baixada Santista": ["Bertioga, SP", "Guarujá, SP", "Santos, SP", "São Vicente, SP", "Praia Grande, SP", "Mongaguá, SP"],
            "Litoral Norte SP": ["São Sebastião, SP", "Ilhabela, SP", "Caraguatatuba, SP", "Ubatuba, SP"],
            "Grande São Paulo": ["São Paulo, SP", "Guarulhos, SP", "Osasco, SP", "São Bernardo, SP", "Santo André, SP", "Barueri, SP"],
            "Rio de Janeiro": ["Rio de Janeiro, RJ", "Niterói, RJ", "Duque de Caxias, RJ", "Nova Iguaçu, RJ", "São Gonçalo, RJ"],
            "Grande Belo Horizonte": ["Belo Horizonte, MG", "Contagem, MG", "Betim, MG", "Nova Lima, MG", "Sabará, MG"],
            "Grande Vitória": ["Vitória, ES", "Vila Velha, ES", "Serra, ES", "Cariacica, ES"],

            // --- SUL ---
            "Grande Curitiba": ["Curitiba, PR", "São José dos Pinhais, PR", "Pinhais, PR", "Araucária, PR", "Colombo, PR"],
            "Grande Porto Alegre": ["Porto Alegre, RS", "Canoas, RS", "Novo Hamburgo, RS", "São Leopoldo, RS", "Gravataí, RS"],
            "Grande Florianópolis": ["Florianópolis, SC", "São José, SC", "Palhoça, SC", "Biguaçu, SC"],

            // --- NORDESTE ---
            "Grande Salvador": ["Salvador, BA", "Lauro de Freitas, BA", "Camaçari, BA", "Simões Filho, BA"],
            "Grande Recife": ["Recife, PE", "Olinda, PE", "Jaboatão dos Guararapes, PE", "Paulista, PE"],
            "Grande Fortaleza": ["Fortaleza, CE", "Caucaia, CE", "Maracanaú, CE", "Eusébio, CE"],
            "Grande Natal": ["Natal, RN", "Parnamirim, RN", "São Gonçalo do Amarante, RN", "Macaíba, RN"],

            // --- CENTRO-OESTE ---
            "Distrito Federal e Entorno": ["Brasília, DF", "Taguatinga, DF", "Ceilândia, DF", "Águas Lindas de Goiás, GO"],
            "Grande Goiânia": ["Goiânia, GO", "Aparecida de Goiânia, GO", "Anápolis, GO", "Senador Canedo, GO"],

            // --- NORTE ---
            "Grande Manaus": ["Manaus, AM", "Iranduba, AM", "Manacapuru, AM", "Careiro, AM"],
            "Grande Belém": ["Belém, PA", "Ananindeua, PA", "Marituba, PA", "Benevides, PA"]
                // Você pode alimentar esta lista com as regiões de atuação do seu software.
        };

        // 4. LÓGICA DE INTERFACE
        function updateClock() {
            document.getElementById("clock").textContent = new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        // Seleção de Background baseada no código e hora
        function bgFor(code, hour) {
            const night = (hour < 6 || hour >= 18);
            if (code === 0 || code === 1) return night ? CATALOG.NoiteAberta : CATALOG.DiaAberto;
            if (code === 2 || code === 3 || code === 45 || code === 48) return CATALOG.Nublado;
            if (code >= 95) return CATALOG.tempestade;
            return CATALOG.Chuvoso;
        }

        // Seleção de Ícone baseada no código e hora
        function iconFor(code, hour) {
            const night = (hour < 6 || hour >= 18);
            if (code === 0 || code === 1) return night ? CATALOG.IconNoite : CATALOG.IconEnsolarado;
            if (code === 2) return CATALOG.IconEnsolarado;
            if (code === 3 || code === 45 || code === 48) return CATALOG.IconNublado;
            if (code >= 95) return CATALOG.IconTempestade;
            return CATALOG.IconChuva;
        }

        function descFor(code) {
            if (code === 0) return "Céu Limpo";
            if (code <= 3) return "Parcialmente Nublado";
            if (code >= 95) return "Tempestade";
            return "Chuva";
        }

        // 5. MOTORES DE DADOS
        async function obterCoordenadas(cidade) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cidade)}&limit=1`);
                const d = await r.json();
                return d.length > 0 ? {
                    lat: d[0].lat,
                    lon: d[0].lon
                } : {
                    lat: -23.8544,
                    lon: -46.1396
                };
            } catch {
                return {
                    lat: -23.8544,
                    lon: -46.1396
                };
            }
        }

        async function fetchWeather(lat, lon, cidadeNome) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`;
                const r = await fetch(url);
                const d = await r.json();
                const cw = d.current_weather;
                const hr = new Date().getHours();

                // UI Principal
                document.getElementById("city").innerText = cidadeNome;
                document.getElementById("temp").innerText = Math.round(cw.temperature) + "°C";
                document.getElementById("feel").innerText = Math.round(cw.temperature) + "°C";
                document.getElementById("cond").innerText = descFor(cw.weathercode);
                document.getElementById("wind").innerText = cw.windspeed + " km/h";

                // Aplicando Imagens do Catálogo
                document.getElementById("bg").style.backgroundImage = `url('${bgFor(cw.weathercode, hr)}')`;
                document.getElementById("icon").src = iconFor(cw.weathercode, hr);
                document.getElementById("updated").innerText = "Atualizado: " + new Date().toLocaleTimeString();

                // Forecast (Previsão 4 dias)
                let html = "";
                for (let i = 1; i <= 4; i++) {
                    const localDate = new Date(d.daily.time[i] + "T00:00:00");
                    const dayName = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"][localDate.getDay()];
                    const wc = d.daily.weathercode[i];

                    html += `
                        <div class="day">
                            <img src="${iconFor(wc, 12)}" alt="Previsão">
                            <div>${dayName}</div>
                            <div>${Math.round(d.daily.temperature_2m_max[i])}° / ${Math.round(d.daily.temperature_2m_min[i])}°</div>
                        </div>`;
                }
                document.getElementById("forecast").innerHTML = html;
            } catch (err) {
                console.error("Erro API Clima:", err);
            }
        }

        async function rodarSistemaClima() {
            let regiao = Object.keys(regioesBrasil).find(r => regioesBrasil[r].includes(cidadeTerminal));
            let lista = regiao ? regioesBrasil[regiao] : [cidadeTerminal];
            let cidadeAtual = lista[indexRegional];

            const coords = await obterCoordenadas(cidadeAtual);
            await fetchWeather(coords.lat, coords.lon, cidadeAtual);

            indexRegional = (indexRegional + 1) % lista.length;
        }

        // 6. VÍNCULO E INICIALIZAÇÃO
        async function verificarVinculo() {
            if (!currentUid) {
                db.collectionGroup("dispositivos").where("deviceId", "==", deviceId)
                    .onSnapshot(snap => {
                        snap.forEach(doc => {
                            const uidEncontrado = doc.ref.parent.parent.id;
                            localStorage.setItem("painelUid", uidEncontrado);
                            location.reload();
                        });
                    });

                // Se não há UID, roda com Bertioga por padrão até vincular
                init();
                return;
            }

            const doc = await db.collection("usuarios").doc(currentUid)
                .collection("dispositivos").doc(deviceId).get();

            if (doc.exists) {
                cidadeTerminal = doc.data().cidade || cidadeTerminal;
            }

            init();
        }

        function init() {
            updateClock();
            setInterval(updateClock, 1000);
            rodarSistemaClima();
            setInterval(rodarSistemaClima, 600000); // Roda a cada 10 minutos
        }

        verificarVinculo();
    </script>
</body>

</html>
